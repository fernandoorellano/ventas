<div class="row">
    <h3>Productos Destacados</h3>
    <div class="col" *ngFor="let item of fireServ.articulos, index as index">
        <div class="columna">
            <img [src]='img_articulo+item.imagen' alt="1">
            <div class="descripcion">
                <p>{{item.nombre}}</p>
                <p>${{item.precio}}</p>
                <button (click)="carritoServ.agregarCarrito(item)">Lo quiero</button>
            </div>
        </div>
    </div>
</div>
